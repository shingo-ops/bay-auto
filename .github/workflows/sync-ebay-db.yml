name: Sync eBay DB (Monthly)

on:
  schedule:
    - cron: '0 3 1 * *'   # 毎月1日 03:00 UTC（日本時間 12:00）
  workflow_dispatch:        # 手動実行
    inputs:
      marketplace:
        description: '取得対象マーケット（ALL = 全市場）'
        required: false
        default: 'ALL'
        type: choice
        options:
          - 'ALL'
          - 'EBAY_US'
          - 'EBAY_GB'
          - 'EBAY_DE'
          - 'EBAY_AU'
          - 'EBAY_JP'
      import_only:
        description: 'true にすると API 取得・CSV 生成をスキップして clasp push + clasp run のみ実行'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      run_function:
        description: 'Step8 で実行する GAS 関数名'
        required: false
        default: 'importAndSync'
        type: string

jobs:
  sync-ebay-db:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    env:
      OUTPUT_DIR: ${{ github.workspace }}/ebay-db/output
      PYTHONUNBUFFERED: '1'
      # スケジュール実行時は marketplace 入力がないため ALL 扱い
      MARKETPLACE: ${{ inputs.marketplace || 'ALL' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create output directory
        if: inputs.import_only != 'true'
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      # ─── Python セットアップ ───────────────────────────────
      - name: Setup Python
        if: inputs.import_only != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: inputs.import_only != 'true'
        run: pip install -r ebay-db/scripts/requirements.txt

      # ─── Step1: eBay カテゴリスペック取得（マーケット別）──
      - name: Step1a - Fetch EBAY_US
        if: inputs.import_only != 'true' && (env.MARKETPLACE == 'ALL' || env.MARKETPLACE == 'EBAY_US')
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -u ebay-db/scripts/fetch_category_master.py fetch EBAY_US

      - name: Step1b - Fetch EBAY_GB
        if: inputs.import_only != 'true' && (env.MARKETPLACE == 'ALL' || env.MARKETPLACE == 'EBAY_GB')
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -u ebay-db/scripts/fetch_category_master.py fetch EBAY_GB

      - name: Step1c - Fetch EBAY_DE
        if: inputs.import_only != 'true' && (env.MARKETPLACE == 'ALL' || env.MARKETPLACE == 'EBAY_DE')
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -u ebay-db/scripts/fetch_category_master.py fetch EBAY_DE

      - name: Step1d - Fetch EBAY_AU
        if: inputs.import_only != 'true' && (env.MARKETPLACE == 'ALL' || env.MARKETPLACE == 'EBAY_AU')
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -u ebay-db/scripts/fetch_category_master.py fetch EBAY_AU

      - name: Step1e - Fetch EBAY_JP
        if: inputs.import_only != 'true' && (env.MARKETPLACE == 'ALL' || env.MARKETPLACE == 'EBAY_JP')
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -u ebay-db/scripts/fetch_category_master.py fetch EBAY_JP

      # ─── Step2: eBay コンディション取得（マーケット別）────
      - name: Step2a - Fetch conditions EBAY_US
        if: inputs.import_only != 'true' && (env.MARKETPLACE == 'ALL' || env.MARKETPLACE == 'EBAY_US')
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -u ebay-db/scripts/fetch_conditions.py fetch EBAY_US

      - name: Step2b - Fetch conditions EBAY_GB
        if: inputs.import_only != 'true' && (env.MARKETPLACE == 'ALL' || env.MARKETPLACE == 'EBAY_GB')
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -u ebay-db/scripts/fetch_conditions.py fetch EBAY_GB

      - name: Step2c - Fetch conditions EBAY_DE
        if: inputs.import_only != 'true' && (env.MARKETPLACE == 'ALL' || env.MARKETPLACE == 'EBAY_DE')
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -u ebay-db/scripts/fetch_conditions.py fetch EBAY_DE

      - name: Step2d - Fetch conditions EBAY_AU
        if: inputs.import_only != 'true' && (env.MARKETPLACE == 'ALL' || env.MARKETPLACE == 'EBAY_AU')
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -u ebay-db/scripts/fetch_conditions.py fetch EBAY_AU

      - name: Step2e - Fetch conditions EBAY_JP
        if: inputs.import_only != 'true' && (env.MARKETPLACE == 'ALL' || env.MARKETPLACE == 'EBAY_JP')
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python -u ebay-db/scripts/fetch_conditions.py fetch EBAY_JP

      # ─── Step3: 取得済みマーケットデータを結合 ────────────
      # 取得したマーケットの category_raw_EBAY_*.json だけを結合する
      - name: Step3 - Combine fetched marketplace data
        if: inputs.import_only != 'true'
        run: python -u ebay-db/scripts/fetch_conditions.py combine

      # ─── Step4: FVFレート抽出（Gemini） ───────────────────
      - name: Step4 - Extract FVF rates via Gemini
        if: inputs.import_only != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u ebay-db/scripts/extract_fvf.py

      # ─── Step5: CSV 生成 ───────────────────────────────────
      - name: Step5 - Generate CSV files
        if: inputs.import_only != 'true'
        run: python -u ebay-db/scripts/generate_csv.py

      # ─── Step6: CSV をリポジトリにコミット ────────────────
      - name: Step6 - Commit CSVs to repository
        if: inputs.import_only != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ebay-db/output/category_master_EBAY_*.csv ebay-db/output/condition_ja_map.csv
          if git diff --staged --quiet; then
            echo "CSVに変更なし。コミットをスキップ"
          else
            git commit -m "data: ebay-db CSV 更新 $(date -u '+%Y-%m-%d') [${MARKETPLACE}]"
            git push
          fi

      # ─── clasp セットアップ ────────────────────────────────
      - name: Setup Node.js for clasp
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Set scriptId for ebay-db/container
        run: |
          cd gas/ebay-db/container
          sed -i "s/REPLACED_BY_CI/${{ secrets.EBAY_DB_CB_DEV }}/" .clasp.json

      # ─── Step7: GAS コードをデプロイ ─────────────────────────
      - name: Step7a - Push GAS code (clasp push)
        working-directory: gas/ebay-db/container
        run: clasp push --force

      # ─── Step8: GAS 関数実行 ──────────────────────────────
      - name: Step8 - Run GAS ${{ inputs.run_function || 'importAndSync' }}
        continue-on-error: true
        working-directory: gas/ebay-db/container
        run: clasp run ${{ inputs.run_function || 'importAndSync' }}

      - name: Notify failure to Discord
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_AUDIT }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"🚨 ebay-db 同期 GitHub Actions FAILED [${MARKETPLACE}]\\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
